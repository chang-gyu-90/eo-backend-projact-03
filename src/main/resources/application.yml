spring:
  application:
    name: mlbf

  datasource:
    url: jdbc:h2:~/mlbf;
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

  mvc:
    pathmatch:
      use-suffix-pattern: false

