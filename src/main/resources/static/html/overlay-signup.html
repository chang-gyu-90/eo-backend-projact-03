<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>

<div id="overlay-signup">
    <div id="overlay-signup-box">
        <button id="overlay-signup-close" onclick="hideOverlay('overlay-signup')">✕</button>
        <h2>회원가입</h2>

        <!-- 아이디 + 중복확인 -->
        <div style="display:flex; gap:8px;">
            <input type="text" id="signup-userId" placeholder="아이디" style="flex:1;">
            <button onclick="checkUserId()" style="width:80px; padding:8px; background:#c0392b; color:white; border-radius:4px; font-size:12px;">중복확인</button>
        </div>
        <p id="userId-check-result"></p>

        <input type="text" id="signup-nickname" placeholder="닉네임">
        <input type="password" id="signup-password" placeholder="비밀번호">
        <input type="password" id="signup-passwordConfirm" placeholder="비밀번호 확인">
        <input type="email" id="signup-email" placeholder="이메일">
        <button id="signup-submit" onclick="signup()">가입하기</button>
        <p>
            이미 계정이 있으신가요?
            <a href="#" onclick="switchOverlay('overlay-signup', 'overlay-login')">로그인</a>
        </p>
        <p id="signup-error"></p>
    </div>
</div>

</body>
</html>
